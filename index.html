<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbita | Mapas Offline Premium</title>
    <meta name="description" content="Explora el mundo sin límites, incluso sin conexión.">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        :root {
            --logo-blue: #2a66ff;
            --logo-green: #10b981;
            --logo-yellow: #ffcc00;
            --logo-red: #ff3b30;
            --bg-deep: #000000;
            --bg-card: rgba(20, 20, 28, 0.85); /* Dark Glass */
            --bg-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Device Frame - Scaled for Desktop Viewports */
        @media (min-width: 501px) {
            #app-container {
                width: 390px;
                height: 844px;
                max-height: 95vh;
                background: #000;
                border: 12px solid #1a1a1a;
                border-radius: 54px;
                position: relative;
                overflow: hidden;
                box-shadow: 0 40px 100px rgba(0,0,0,0.9);
                margin: auto;
            }
            #app-container::before {
                content: '';
                position: absolute;
                top: 0; left: 50%; transform: translateX(-50%);
                width: 120px; height: 30px;
                background: #1a1a1a; border-radius: 0 0 18px 18px;
                z-index: 5000;
            }
        }

        @media (max-width: 500px) {
            #app-container { width: 100%; height: 100%; border-radius: 0; border: none; }
        }

        #app { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #map { position: absolute; inset: 0; z-index: 1; width: 100%; height: 100%; display: block; filter: brightness(0.9); }

        .vignette {
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.6) 100%);
        }

        /* Professional UI Header */
        .top-interface {
            position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
            display: flex; flex-direction: column;
            padding-top: 35px; /* Leave space for notch */
        }

        .nav-transport-bar {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            height: 80px;
            padding: 0 20px;
            display: flex; align-items: center; justify-content: center;
        }

        .modes-container { 
            display: flex; gap: 12px; background: rgba(255,255,255,0.08); 
            padding: 6px; border-radius: 30px; backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
        }
        .nav-mode-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.05); color: white; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-mode-btn.active { 
            background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        .search-container { padding: 15px 16px; width: 100%; pointer-events: auto; }
        .search-bar-app {
            height: 52px; background: var(--bg-card); border-radius: 20px;
            display: flex; align-items: center; padding: 0 16px;
            backdrop-filter: blur(20px); border: 1px solid var(--border-glass);
            transition: all 0.3s;
        }
        .search-bar-app:focus-within { border-color: var(--logo-blue); box-shadow: 0 0 20px rgba(42,102,255,0.2); }
        .search-bar-app input { flex: 1; background: transparent; border: none; outline: none; font-size: 1.05rem; color: white; font-weight: 400; font-family: 'Inter'; }
        .search-bar-app input::placeholder { color: rgba(255,255,255,0.4); }
        
        .right-controls {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 1000;
        }
        .control-btn {
            width: 50px; height: 50px; background: var(--bg-card); border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: white; cursor: pointer; border: 1px solid var(--border-glass);
            backdrop-filter: blur(20px); transition: all 0.2s;
        }
        .control-btn:active { transform: scale(0.92); opacity: 0.8; }

        .bottom-nav {
            position: absolute; bottom: 30px; left: 20px; right: 20px; height: 72px;
            background: var(--bg-card); backdrop-filter: blur(25px);
            border-radius: 24px; display: flex;
            justify-content: space-around; align-items: center; z-index: 1000;
            border: 1px solid var(--border-glass);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .nav-item {
            background: transparent; border: none; color: var(--text-dim);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .nav-item i { font-size: 1.5rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--logo-blue); text-shadow: 0 0 15px rgba(42, 102, 255, 0.5); }

        .white-ui {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: #0a0a0c; border-radius: 32px 32px 0 0; padding: 24px;
            z-index: 2000; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            border-top: 1px solid var(--border-glass);
        }
        .white-ui:not(.hidden) { transform: translateY(0); }
        .hidden { display: none !important; }
        
        .dist-badge { background: rgba(42, 102, 255, 0.15); color: var(--logo-blue); padding: 8px 14px; border-radius: 14px; font-weight: 700; font-size: 1rem; }
        
        .side-panel {
            position: absolute; inset: 0; background: #000; z-index: 4000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(0);
            display: flex; flex-direction: column;
        }
        .side-panel.hidden { transform: translateX(-100%); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 24px; border-bottom: 1px solid var(--border-glass); }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        .search-container { position: relative; width: 100%; pointer-events: auto; }
        .search-results-popover {
            position: absolute; top: 100%; left: 16px; right: 16px; 
            background: white; border-radius: 12px; margin-top: 8px;
            max-height: 300px; overflow-y: auto; z-index: 5000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .result-item { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; color: #333; display: flex; align-items: center; gap: 12px; }
        .result-item:hover { background: #f9f9f9; }

        .menu-list { padding: 16px; }
        .menu-group { margin-bottom: 24px; }
        .menu-item {
            width: 100%; background: #f7f7f7; border: none; padding: 16px; 
            border-radius: 16px; display: flex; align-items: center; gap: 12px;
            color: #333; font-weight: 600; margin-bottom: 8px; cursor: pointer;
        }
        .empty-msg { padding: 40px 24px; text-align: center; color: #999; font-size: 0.95rem; }
        .close-panel { background: transparent; border: none; font-size: 1.5rem; color: #666; cursor: pointer; }

        /* Splash Screen & Entry Animation */
        #splash-screen {
            position: absolute; inset: 0; background: #000;
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .splash-logo {
            width: 140px; height: 140px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 40px; position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(42, 102, 255, 0.4);
        }
        .splash-logo img { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: scale(1.22); /* Tight zoom to match ring diameter to container exactly */
            mix-blend-mode: screen; /* Total invisibility of any black background remnants */
        }
        .splash-logo::before {
            content: ''; position: absolute; inset: -30px; 
            background: radial-gradient(circle, rgba(255,160,0,0.2) 0%, transparent 70%);
            z-index: -1; animation: logo-bloom 4s infinite alternate ease-in-out;
        }
        @keyframes logo-bloom { from { transform: scale(0.9); opacity: 0.1; } to { transform: scale(1.1); opacity: 0.3; } }
        
        .splash-title { display: none; }
        .splash-loading { width: 220px; height: 3px; background: rgba(255,255,255,0.03); border-radius: 10px; overflow: hidden; margin-top: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .splash-bar { 
            height: 100%; background: linear-gradient(90deg, #2a66ff, #10b981, #ffcc00, #ff3b30); 
            width: 0%; transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }
        
        #btn-skip-loading {
            margin-top: 60px; background: transparent; border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.2); padding: 12px 28px; border-radius: 30px; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
            cursor: pointer; opacity: 0; transition: all 0.5s; pointer-events: none;
        }
        #btn-skip-loading:hover { background: rgba(255,255,255,0.05); color: white; border-color: white; }
        #btn-skip-loading.visible { opacity: 1; pointer-events: auto; }

        /* User Marker & Navigation Styles */
        .user-location-arrow { width: 44px; height: 44px; position: relative; }
        .arrow-icon {
            width: 0; height: 0; border-left: 11px solid transparent; border-right: 11px solid transparent;
            border-bottom: 26px solid var(--logo-blue); position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -60%); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }
        .pulse-ring {
            width: 100%; height: 100%; border-radius: 50%; background: rgba(42, 102, 255, 0.1);
            border: 2px solid var(--logo-blue); animation: pulse 3s infinite; position: absolute;
        }
        @keyframes pulse {
            0% { transform: scale(0.7); opacity: 1; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        /* Style Picker */
        .style-panel {
            position: absolute; right: 75px; top: 50%; transform: translateY(-50%);
            width: 170px; padding: 12px; border-radius: 24px; z-index: 3000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .style-panel h3 { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .style-panel button {
            width: 100%; padding: 14px; border: none; border-radius: 16px;
            background: rgba(255,255,255,0.06); color: white; font-weight: 600; cursor: pointer; 
            transition: all 0.3s; display: flex; align-items: center; gap: 12px;
            border: 1px solid transparent;
        }
        .style-panel button:hover { background: rgba(255,255,255,0.15); border-color: var(--logo-blue); }

        .glass { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); }

        /* Marker overrides */
        .custom-marker { 
            width: 34px; height: 34px; border-radius: 50%; border: 2.5px solid white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .custom-marker:hover { transform: scale(1.15) translateY(-5px); z-index: 1000; }
        .marker-inner-icon { display: flex; align-items: center; justify-content: center; }

        .results-info { 
            padding: 12px 16px; font-size: 0.75rem; color: var(--logo-blue); 
            border-bottom: 1px solid var(--border-glass); font-weight: 700;
            background: rgba(42, 102, 255, 0.08);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
    </style>
    <!-- MapLibre GL -->
    <script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css' rel='stylesheet' />
</head>
<body>
    <div id="app-container">
        <div id="app">
        <div id="map"></div>
        <div class="vignette"></div>
        
        <!-- UI: Top Search Bar (App-Style) -->
        <div class="top-interface">
            <!-- Transport Navigation Bar (Organic Maps Style) -->
            <div class="nav-transport-bar">
                <button class="nav-back-btn">←</button>
                <div class="modes-container">
                    <button class="nav-mode-btn" data-mode="drive"><i class="fa-solid fa-car"></i></button>
                    <button class="nav-mode-btn active" data-mode="walk"><i class="fa-solid fa-person-walking"></i></button>
                    <button class="nav-mode-btn" data-mode="train"><i class="fa-solid fa-train"></i></button>
                    <button class="nav-mode-btn" data-mode="bike"><i class="fa-solid fa-bicycle"></i></button>
                </div>
            </div>

            <div class="search-container">
                <div class="search-bar-app glass">
                    <div class="logo-mini-spectrum"></div>
                    <input type="text" placeholder="Buscar en Orbita..." id="header-search">
                    <button id="search-submit" class="icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <!-- Search Suggestions/Results Dropdown -->
                <div id="search-results" class="search-results-popover hidden glass"></div>
            </div>
        </div>

        <!-- UI: Floating Right Buttons -->
        <div class="right-controls">
            <button id="btn-fullscreen" class="control-btn glass" title="Pantalla completa"><i class="fa-solid fa-expand"></i></button>
            <button id="btn-zoom-in" class="control-btn glass" title="Aumentar"><i class="fa-solid fa-plus"></i></button>
            <button id="btn-zoom-out" class="control-btn glass" title="Alejar"><i class="fa-solid fa-minus"></i></button>
            <div style="height: 10px;"></div>
            <button id="btn-styles" class="control-btn glass" title="Estilo del mapa"><i class="fa-solid fa-layer-group"></i></button>
            <button id="btn-locate" class="control-btn glass" title="Mi ubicación"><i class="fa-solid fa-location-crosshairs"></i></button>
            <button id="btn-offline" class="control-btn glass" title="Offline"><i class="fa-solid fa-wifi-slash"></i></button>
        </div>

        <!-- Popovers -->
        <div id="style-picker" class="glass hidden style-panel">
            <h3>Capas</h3>
            <button data-style="streets"><i class="fa-solid fa-city"></i> Urbano</button>
            <button data-style="dark"><i class="fa-solid fa-moon"></i> Oscuro</button>
            <button data-style="outdoors"><i class="fa-solid fa-mountain-sun"></i> Aventura</button>
        </div>

        <!-- My Maps Panel (Download Center) -->
        <div id="my-maps-panel" class="side-panel glass hidden">
            <div class="panel-header">
                <h2>Mis Mapas</h2>
                <button class="close-panel"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="panel-content">
                <div class="download-section">
                    <p class="section-title">DESCARGAR MAPAS</p>
                    <div class="download-item">
                        <div class="item-info">
                            <span class="country">Argentina</span>
                            <span class="region">Buenos Aires</span>
                        </div>
                        <button class="dl-btn"><i class="fa-solid fa-download"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bookmarks Panel -->
        <div id="bookmarks-panel" class="side-panel glass hidden">
            <div class="panel-header">
                <h2>Favoritos</h2>
                <button class="close-panel"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="panel-content" id="bookmarks-list">
                <p class="empty-msg">No tienes lugares guardados todavía.</p>
            </div>
        </div>

        <!-- Menu/Settings Panel -->
        <div id="menu-panel" class="side-panel glass hidden">
            <div class="panel-header">
                <h2>Ajustes</h2>
                <button class="close-panel"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="panel-content">
                <div class="menu-list">
                    <div class="menu-group">
                        <label>App</label>
                        <button class="menu-item" id="menu-celestial"><span><i class="fa-solid fa-rocket"></i></span> Modo Orbital</button>
                        <button class="menu-item"><span><i class="fa-solid fa-circle-info"></i></span> Acerca de Orbita</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation Bar (Organic Maps style) -->
        <nav class="bottom-nav glass">
            <button class="nav-item active" id="nav-map"><span><i class="fa-solid fa-compass"></i></span>Mapa</button>
            <button class="nav-item" id="nav-search"><span><i class="fa-solid fa-magnifying-glass"></i></span>Buscar</button>
            <button class="nav-item" id="nav-bookmarks"><span><i class="fa-solid fa-bookmark"></i></span>Favoritos</button>
            <button class="nav-item" id="nav-mymaps"><span><i class="fa-solid fa-box-archive"></i></span>Mis Mapas</button>
            <button class="nav-item" id="nav-menu"><span><i class="fa-solid fa-bars"></i></span>Menú</button>
        </nav>

        <!-- Dynamic Bottom Sheet -->
        <div id="bottom-sheet" class="bottom-sheet white-ui hidden">
            <div class="sheet-handle"></div>
            <div class="sheet-content">
                <div class="poi-header-alt">
                    <div class="title-section">
                        <h2 id="sheet-title">Astronomical Clock</h2>
                        <p id="sheet-subtitle">Staroměstský orloj • Attraction</p>
                    </div>
                    <div class="dist-badge">
                        <span class="arrow">↗</span>
                        <span id="sheet-dist-val">1.8 km</span>
                    </div>
                </div>
                
                <div class="action-footer">
                    <button class="footer-btn" id="btn-save-bookmark">SAVE BOOKMARK</button>
                    <div class="footer-icons">
                        <button class="f-icon" id="btn-share-poi">📤</button>
                        <button class="f-icon" id="btn-route-action">🚶</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress Overlay (for downloading) -->
        <div id="download-progress" class="download-overlay hidden">
            <div class="progress-card glass">
                <h3>Preparando descarga offline...</h3>
                <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
                <p id="progress-percent">0%</p>
            </div>
        </div>

        <!-- Splash Screen -->
        <div id="splash-screen">
            <div class="splash-logo">
                <img src="/logo_final.png" alt="Orbita Logo">
            </div>
            <div class="splash-loading"><div class="splash-bar" id="splash-bar"></div></div>
            <button id="btn-skip-loading">OMITIR CARGA</button>
        </div>
        
        </div> <!-- End #app -->
    </div> <!-- End #app-container -->
    
    <script type="module" src="/main.js"></script>
</body>
</html>
